<!DOCTYPE html>
<html lang="en">
<body>
    <h1>MangaLens</h1>
    <label for="sourceLangSelect">Comic language:</label>
    <select id="sourceLangSelect">
        <option value="Korean">Korean</option>
        <option value="English">English</option>
    </select>
    <br><br>
    <label for="translatorSelect">Translator:</label>
    <select id="translatorSelect">
        <option value="llm">LLM (Groq)</option>
        <option value="google">Google Translate</option>
    </select>
    <br><br>
    <label for="targetLangSelect">Translate to:</label>
    <select id="targetLangSelect">
        <option value="English">English</option>
        <option value="Chinese">Chinese</option>
    </select>
    <br><br>
    <button id="scanBtn">Scan page</button>

    <p id="result"></p>

    <script src="popup.js"></script>
</body>
</html>
